<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoCampus</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-green-600">EcoCampus</h1>
            <p class="text-sm text-gray-500">Login with Student ID</p>
        </div>

        <!-- Message -->
        <div id="auth-message" class="text-red-500 text-sm text-center mb-4 h-5"></div>

        <!-- Form -->
        <form id="login-form" class="space-y-4">

            <!-- Student ID -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Student ID
                </label>
                <input 
                    type="text"
                    id="login-studentid"
                    required
                    placeholder="Enter Student ID"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Password
                </label>
                <input 
                    type="password"
                    id="login-password"
                    required
                    placeholder="Enter Password"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                >
            </div>

            <!-- Button -->
            <button 
                type="submit"
                id="login-button"
                class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-semibold flex items-center justify-center"
            >
                <span class="btn-text">Login</span>
                <span class="hidden ml-2 animate-spin">⏳</span>
            </button>

        </form>

    </div>

    <!-- ✅ REQUIRED SCRIPTS (ORDER IMPORTANT) -->

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Shared client -->
    <script src="../supabase.js"></script>

    <!-- Login logic -->
    <script src="login.js"></script>

</body>
</html>
